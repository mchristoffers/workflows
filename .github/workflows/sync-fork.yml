name: Sync Fork

on:
  workflow_call:
    inputs:
      upstream:
        description: "Upstream repo (e.g. NousResearch/hermes-agent)"
        required: true
        type: string
      branch:
        description: "Branch to sync"
        required: true
        type: string

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Sync upstream
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/${{ inputs.upstream }}.git
          git fetch upstream
          if ! git merge upstream/${{ inputs.branch }} --no-edit; then
            git merge --abort
            echo "CONFLICT=true" >> $GITHUB_ENV
          fi
      - name: Push changes
        if: env.CONFLICT != 'true'
        run: git push
      - name: Open issue on conflict
        if: env.CONFLICT == 'true'
        run: |
          existing=$(gh issue list --label "sync-conflict" --state open --json number --jq 'length')
          if [ "$existing" = "0" ]; then
            gh issue create \
              --title "Fork sync conflict with upstream" \
              --label "sync-conflict" \
              --body "Automatic sync from \`${{ inputs.upstream }}\` failed due to a merge conflict on \`${{ inputs.branch }}\`.

          **To resolve:**
          \`\`\`bash
          git remote add upstream https://github.com/${{ inputs.upstream }}.git
          git fetch upstream
          git merge upstream/${{ inputs.branch }}
          # fix conflicts
          git push
          \`\`\`"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
