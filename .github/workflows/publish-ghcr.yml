name: Publish Docker image to ghcr.io

# Reusable workflow: builds a Docker image and pushes it to ghcr.io under
# the calling repository's name. Tags: `latest` and `sha-<short>`.
#
# Caller minimal example:
#
#   jobs:
#     publish:
#       uses: mchristoffers/workflows/.github/workflows/publish-ghcr.yml@main
#
# Caller must declare `permissions: { contents: read, packages: write }` at
# job or workflow level (a callee can only narrow, not expand, caller perms).

on:
  workflow_call:
    inputs:
      image_name:
        description: "Image name as 'owner/repo'. Defaults to the caller repo's full name (github.repository)."
        required: false
        type: string
        default: ""
      context:
        description: "Docker build context."
        required: false
        type: string
        default: "."
      dockerfile:
        description: "Path to the Dockerfile (relative to repo root)."
        required: false
        type: string
        default: "Dockerfile"
      platforms:
        description: "Target platforms (comma-separated)."
        required: false
        type: string
        default: "linux/amd64"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image + tags
        id: meta
        run: |
          IMAGE="ghcr.io/${{ inputs.image_name || github.repository }}"
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "$IMAGE:latest"
            echo "$IMAGE:sha-$SHORT_SHA"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
